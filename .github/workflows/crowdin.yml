# This workflow uploads new texts to Crowdin, downloads translated resources,
# normalizes Minecraft lang file names, and then creates a PR.
# For more information see: https://github.com/crowdin/github-action
name: Crowdin Action
on:
  workflow_dispatch:
    inputs:
      uploadTranslations:
        description: "Set to true to upload (changed) translations to Crowdin"
        type: boolean
        required: true
        default: false
jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew
      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: ${{ github.event.inputs.uploadTranslations }}
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
      - name: Normalize lang file names
        run: ./gradlew :simulated:common:normalizeLangFileNames :aeronautics:common:normalizeLangFileNames :offroad:common:normalizeLangFileNames
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: l10n_crowdin_translations
          base: main
          commit-message: 'chore(i18n): sync Crowdin translations'
          title: 'New Crowdin translations'
          body: 'New Crowdin pull request with translations'
